[build]
  command = "npm install && npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/tts"
  to = "/.netlify/functions/elevenlabs-tts"
  status = 200

[[redirects]]
  from = "/api/voices"
  to = "/.netlify/functions/elevenlabs-voices"
  status = 200

# Chapter URLs — serve index.html for /read/* (static assets unchanged)
[[redirects]]
  from = "/read"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/read/*"
  to = "/index.html"
  status = 200
